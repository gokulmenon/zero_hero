<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zero Hero: The Name of Numbers</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            overscroll-behavior: none;
            /* Prevent text selection during rapid tapping */
            -webkit-user-select: none;
            user-select: none;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.05);
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        /* Tile Animation */
        .tile {
            transition: transform 0.1s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.1s ease;
            touch-action: manipulation; /* improved touch handling */
        }
        .tile:active {
            transform: scale(0.92);
        }

        /* Modal Animation */
        #modal-overlay {
            transition: opacity 0.3s ease;
        }
        #modal-content {
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.3s ease;
        }
        
        .zero-count-text {
            font-feature-settings: "tnum";
            font-variant-numeric: tabular-nums;
        }

        /* Long number wrapping */
        .number-scroll {
            mask-image: linear-gradient(to right, transparent, black 10%, black 90%, transparent);
            -webkit-mask-image: linear-gradient(to right, transparent, black 10%, black 90%, transparent);
        }

        /* Loading Animation */
        .dot-flashing {
            position: relative;
            width: 6px;
            height: 6px;
            border-radius: 5px;
            background-color: currentColor;
            color: currentColor;
            animation: dot-flashing 1s infinite linear alternate;
            animation-delay: 0.5s;
        }
        .dot-flashing::before, .dot-flashing::after {
            content: "";
            display: inline-block;
            position: absolute;
            top: 0;
        }
        .dot-flashing::before {
            left: -10px;
            width: 6px;
            height: 6px;
            border-radius: 5px;
            background-color: currentColor;
            color: currentColor;
            animation: dot-flashing 1s infinite alternate;
            animation-delay: 0s;
        }
        .dot-flashing::after {
            left: 10px;
            width: 6px;
            height: 6px;
            border-radius: 5px;
            background-color: currentColor;
            color: currentColor;
            animation: dot-flashing 1s infinite alternate;
            animation-delay: 1s;
        }
        @keyframes dot-flashing {
            0% { background-color: currentColor; }
            50%, 100% { background-color: rgba(100, 100, 100, 0.2); }
        }
    </style>
</head>
<body class="h-[100dvh] w-full flex flex-col overflow-hidden text-slate-800 bg-slate-50">

    <header class="flex-none p-4 bg-white shadow-sm z-10 text-center relative">
        <h1 class="text-2xl md:text-3xl font-black text-indigo-600 tracking-tight">Zero Hero</h1>
        <p class="text-xs md:text-sm text-slate-500 font-bold mt-1">Tap a number to see its name!</p>
        
        <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-blue-400 via-purple-500 to-pink-500"></div>
    </header>

    <main class="flex-1 overflow-y-auto p-2 md:p-6 flex justify-center">
        <div class="w-full max-w-2xl">
            <div id="grid-container" class="grid grid-cols-5 md:grid-cols-10 gap-2 md:gap-3 pb-20">
                </div>
        </div>
    </main>

    <div id="modal-overlay" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm opacity-0 pointer-events-none" aria-hidden="true">
        
        <div id="modal-content" class="bg-white w-full max-w-sm md:max-w-md rounded-3xl shadow-2xl overflow-hidden transform scale-90 opacity-0 flex flex-col max-h-[90vh]">
            
            <div id="modal-header-bg" class="p-6 text-center bg-indigo-500 text-white relative overflow-hidden shrink-0">
                <div class="absolute -top-10 -right-10 w-32 h-32 bg-white/10 rounded-full"></div>
                <div class="absolute top-10 -left-10 w-20 h-20 bg-white/10 rounded-full"></div>

                <div class="relative z-10">
                    <span class="inline-block px-3 py-1 bg-black/20 rounded-full text-xs font-bold uppercase tracking-wider mb-2">
                        <span id="modal-zeros">0</span> Zeros
                    </span>
                    <h2 id="modal-title" class="text-3xl md:text-4xl font-black leading-tight break-words">
                        Million
                    </h2>
                </div>
                
                <button id="close-btn" class="absolute top-4 right-4 p-2 bg-black/20 hover:bg-black/30 text-white rounded-full transition">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>

            <div class="p-6 flex-1 overflow-y-auto flex flex-col items-center">
                
                <div class="mb-4 text-center">
                    <span class="text-slate-400 text-xs font-bold uppercase tracking-wide">Scientific Notation</span>
                    <div class="text-3xl font-black text-slate-700 mt-1">
                        10<sup id="modal-power" class="text-lg text-indigo-500">6</sup>
                    </div>
                </div>

                <div class="w-full text-center mb-6">
                    <span class="text-slate-400 text-xs font-bold uppercase tracking-wide">Looks like</span>
                    <div class="mt-2 p-3 bg-slate-50 rounded-xl border border-slate-100 overflow-x-auto number-scroll whitespace-nowrap">
                        <span id="modal-visual" class="text-lg md:text-xl font-mono text-slate-600 font-bold tracking-widest">
                            1,000,000
                        </span>
                    </div>
                    <p id="modal-visual-note" class="text-xs text-slate-400 mt-1 hidden">(Scroll to see the whole number!)</p>
                </div>

                <div class="w-full grid grid-cols-2 gap-3 mb-4">
                    <button id="btn-pronounce" class="flex flex-col items-center justify-center p-3 rounded-xl border-2 border-slate-100 hover:border-indigo-100 hover:bg-indigo-50 transition group">
                        <span class="text-2xl mb-1 group-hover:scale-110 transition-transform">🔊</span>
                        <span class="text-xs font-bold text-slate-600 group-hover:text-indigo-600">Say Name</span>
                        <div id="loader-pronounce" class="hidden mt-2"><div class="dot-flashing text-indigo-500"></div></div>
                    </button>
                    <button id="btn-fact" class="flex flex-col items-center justify-center p-3 rounded-xl border-2 border-slate-100 hover:border-purple-100 hover:bg-purple-50 transition group">
                        <span class="text-2xl mb-1 group-hover:scale-110 transition-transform">✨</span>
                        <span class="text-xs font-bold text-slate-600 group-hover:text-purple-600">Fun Fact</span>
                        <div id="loader-fact" class="hidden mt-2"><div class="dot-flashing text-purple-500"></div></div>
                    </button>
                </div>

                <div id="modal-context-box" class="w-full hidden bg-gradient-to-br from-indigo-50 to-purple-50 p-4 rounded-xl border border-indigo-100 animate-fade-in">
                    <p id="modal-context-text" class="text-sm text-indigo-900 font-medium leading-relaxed text-center"></p>
                </div>

            </div>

            <div class="p-4 bg-slate-50 border-t border-slate-100 shrink-0 text-center">
                <button onclick="closeModal()" class="w-full py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-xl shadow-lg shadow-indigo-200 transition transform active:scale-95">
                    Got it!
                </button>
            </div>
        </div>
    </div>

    <script>
        // TODO: PASTE YOUR GEMINI API KEY HERE
        const apiKey = "AIzaSyBYMQ6GRpZQoJ6vYZncXyuc-1CBSw2A314"; 
        let currentAudio = null;

        // --- Data & Logic ---

        const illions = [
            "", "Million", "Billion", "Trillion", "Quadrillion", "Quintillion", 
            "Sextillion", "Septillion", "Octillion", "Nonillion", "Decillion", 
            "Undecillion", "Duodecillion", "Tredecillion", "Quattuordecillion", 
            "Quindecillion", "Sexdecillion", "Septendecillion", "Octodecillion", 
            "Novemdecillion", "Vigintillion", "Unvigintillion", "Duovigintillion", 
            "Trevigintillion", "Quattuorvigintillion", "Quinvigintillion", 
            "Sexvigintillion", "Septenvigintillion", "Octovigintillion", 
            "Novemvigintillion", "Trigintillion", "Untrigintillion", "Duotrigintillion"
        ];

        function getNumberName(zeros) {
            if (zeros === 100) return "Googol";
            if (zeros === 0) return "One"; 
            
            if (zeros < 3) {
                if (zeros === 1) return "Ten";
                if (zeros === 2) return "Hundred";
            }
            if (zeros < 6) {
                if (zeros === 3) return "Thousand";
                if (zeros === 4) return "Ten Thousand";
                if (zeros === 5) return "Hundred Thousand";
            }

            const arrayIndex = Math.floor((zeros - 3) / 3);
            const baseName = illions[arrayIndex] || "Unknown Big Number";
            const remainder = zeros % 3;
            
            if (remainder === 0) return baseName;
            if (remainder === 1) return "Ten " + baseName;
            if (remainder === 2) return "Hundred " + baseName;

            return baseName;
        }

        function getNumberVisual(zeros) {
            if (zeros > 100) return "10^" + zeros;
            let str = "1";
            for(let i=0; i<zeros; i++) str += "0";
            return str.replace(/\B(?=(\d{3})+(?!\d))/g, ",");
        }

        // --- Gemini Integration ---

        async function fetchGeminiFact(zeros, name) {
            const btn = document.getElementById('btn-fact');
            const loader = document.getElementById('loader-fact');
            const box = document.getElementById('modal-context-box');
            const textBox = document.getElementById('modal-context-text');

            if (!apiKey) {
                alert("Please add your API Key in the code!");
                return;
            }

            btn.disabled = true;
            loader.classList.remove('hidden');
            box.classList.add('hidden');

            try {
                let attempt = 0;
                let result = null;
                while (attempt < 3 && !result) {
                    try {
                        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                contents: [{
                                    parts: [{
                                        text: `Tell me a fun, easy-to-understand fact or analogy about the number "${name}" (10^${zeros}). If it's a huge number, compare it to atoms in the universe or something similar. Keep it very short (max 2 sentences) and suitable for a student.`
                                    }]
                                }]
                            })
                        });
                        if (response.ok) result = await response.json();
                        else throw new Error('API Error');
                    } catch (e) {
                        attempt++;
                        await new Promise(r => setTimeout(r, 1000 * attempt));
                    }
                }

                if (!result) throw new Error("Failed to fetch");

                const text = result.candidates[0].content.parts[0].text;
                textBox.textContent = text;
                box.classList.remove('hidden');

            } catch (error) {
                console.error(error);
                textBox.textContent = "Oops! My brain is tired. Try again later! 🧠";
                box.classList.remove('hidden');
            } finally {
                btn.disabled = false;
                loader.classList.add('hidden');
            }
        }

        async function fetchPronunciation(name) {
            const btn = document.getElementById('btn-pronounce');
            const loader = document.getElementById('loader-pronounce');
            
            if (!apiKey) {
                alert("Please add your API Key in the code!");
                return;
            }

            if (currentAudio) {
                currentAudio.pause();
                currentAudio = null;
            }

            // FIX: Initialize audio immediately for iOS support
            const audioObj = new Audio();
            currentAudio = audioObj;

            btn.disabled = true;
            loader.classList.remove('hidden');

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: "Say this number name slowly and clearly: " + name }] }],
                        generationConfig: {
                            responseModalities: ["AUDIO"],
                            speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Kore" } } }
                        }
                    })
                });

                const result = await response.json();
                const base64Audio = result.candidates[0].content.parts[0].inlineData.data;
                
                // FIX: Decode base64 to binary and use as MP3 (no WAV header needed)
                const binaryString = window.atob(base64Audio);
                const len = binaryString.length;
                const bytes = new Uint8Array(len);
                for (let i = 0; i < len; i++) {
                    bytes[i] = binaryString.charCodeAt(i);
                }
                
                const blob = new Blob([bytes], { type: 'audio/mp3' });
                const url = URL.createObjectURL(blob);
                
                audioObj.src = url;
                
                // Try playing. Note: iOS still sometimes blocks async play, 
                // but this structure is the most compatible.
                await audioObj.play();

            } catch (error) {
                console.error("TTS Error", error);
                alert("Could not pronounce that right now!");
            } finally {
                btn.disabled = false;
                loader.classList.add('hidden');
            }
        }

        // --- UI Construction ---

        const gridContainer = document.getElementById('grid-container');
        const modalOverlay = document.getElementById('modal-overlay');
        const modalContent = document.getElementById('modal-content');

        const colors = [
            'bg-blue-100 text-blue-600 border-blue-200',
            'bg-indigo-100 text-indigo-600 border-indigo-200',
            'bg-purple-100 text-purple-600 border-purple-200', 
            'bg-pink-100 text-pink-600 border-pink-200',
            'bg-rose-100 text-rose-600 border-rose-200',
            'bg-orange-100 text-orange-600 border-orange-200',
            'bg-amber-100 text-amber-600 border-amber-200',
            'bg-emerald-100 text-emerald-600 border-emerald-200',
            'bg-teal-100 text-teal-600 border-teal-200',
            'bg-cyan-100 text-cyan-600 border-cyan-200',
        ];

        for (let i = 1; i <= 100; i++) {
            const btn = document.createElement('button');
            const colorClass = colors[(i - 1) % 10]; 
            const isSpecial = i === 100;
            
            btn.className = `
                tile group relative w-full aspect-square rounded-2xl border-b-4 
                flex flex-col items-center justify-center 
                ${isSpecial ? 'bg-gradient-to-br from-yellow-300 to-orange-400 text-white border-orange-500 shadow-orange-200' : colorClass}
            `;
            
            btn.innerHTML = `
                <span class="text-xs md:text-sm opacity-60 font-bold uppercase tracking-wider mb-0.5">Zeros</span>
                <span class="text-2xl md:text-3xl font-black zero-count-text">${i}</span>
                ${isSpecial ? '<span class="absolute -top-1 -right-1 text-lg">👑</span>' : ''}
            `;

            // FIX: Removed manual touchstart/touchmove logic. 
            // Browsers automatically handle scroll-cancel-click correctly.
            btn.onclick = () => openModal(i);

            gridContainer.appendChild(btn);
        }

        // --- Modal Logic ---

        function openModal(zeros) {
            const name = getNumberName(zeros);
            const visual = getNumberVisual(zeros);
            
            document.getElementById('modal-zeros').textContent = zeros;
            document.getElementById('modal-title').textContent = name;
            document.getElementById('modal-power').textContent = zeros;
            document.getElementById('modal-visual').textContent = visual;

            // Reset AI Feature UI
            document.getElementById('modal-context-box').classList.add('hidden');
            document.getElementById('modal-context-text').textContent = "";
            document.getElementById('loader-fact').classList.add('hidden');
            document.getElementById('loader-pronounce').classList.add('hidden');
            
            document.getElementById('btn-fact').onclick = () => fetchGeminiFact(zeros, name);
            document.getElementById('btn-pronounce').onclick = () => fetchPronunciation(name);

            const headerColors = ['bg-blue-500', 'bg-indigo-500', 'bg-purple-500', 'bg-pink-500', 'bg-rose-500', 'bg-orange-500', 'bg-emerald-500', 'bg-teal-500'];
            const header = document.getElementById('modal-header-bg');
            headerColors.forEach(c => header.classList.remove(c));
            
            if (zeros === 100) header.classList.add('bg-yellow-500');
            else header.classList.add(headerColors[zeros % headerColors.length]);

            const titleEl = document.getElementById('modal-title');
            if (name.length > 15) {
                titleEl.classList.remove('text-3xl', 'md:text-4xl');
                titleEl.classList.add('text-2xl', 'md:text-3xl');
            } else {
                titleEl.classList.add('text-3xl', 'md:text-4xl');
                titleEl.classList.remove('text-2xl', 'md:text-3xl');
            }

            const scrollNote = document.getElementById('modal-visual-note');
            if (visual.length > 15) scrollNote.classList.remove('hidden');
            else scrollNote.classList.add('hidden');

            modalOverlay.classList.remove('pointer-events-none', 'opacity-0');
            modalContent.classList.remove('scale-90', 'opacity-0');
            modalContent.classList.add('scale-100', 'opacity-100');
        }

        function closeModal() {
            if (currentAudio) {
                currentAudio.pause();
                currentAudio = null;
            }
            modalOverlay.classList.add('opacity-0');
            modalContent.classList.remove('scale-100', 'opacity-100');
            modalContent.classList.add('scale-90', 'opacity-0');
            
            setTimeout(() => {
                modalOverlay.classList.add('pointer-events-none');
            }, 300);
        }

        modalOverlay.addEventListener('click', (e) => {
            if (e.target === modalOverlay) closeModal();
        });
        document.getElementById('close-btn').addEventListener('click', closeModal);
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });

    </script>
</body>
</html>
